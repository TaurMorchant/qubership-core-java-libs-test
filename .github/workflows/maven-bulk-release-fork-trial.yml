# $schema: https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json

name: "Maven bulk release of monorepo core libs"
run-name: Maven bulk release of monorepo core-libs [${{ inputs.branch }}] [module:${{ inputs.moduleToRelease }}] [dry-run:${{ inputs.dryRun }}] by @${{ github.actor }}'

on:
  workflow_dispatch:
    inputs:
      branch:
        type: string
        description: "branch"
        default: "main"
      moduleToRelease:
        type: choice
        description: "The Module to bulk release from. Select 'all' to release all modules"
        options:
          - all
          - core-blue-green-state-monitor-quarkus
          - core-blue-green-state-monitor
          - core-context-propagation-quarkus
          - core-context-propagation
          - core-error-handling
          - core-junit-k8s-extension
          - core-microservice-dependencies
          - core-microservice-framework-extensions
          - core-microservice-framework
          - core-mongo-evolution
          - core-process-orchestrator
          - core-quarkus-extensions
          - core-rest-libraries
          - core-restclient
          - core-springboot-starter
          - core-utils
          - dbaas-client
          - maas-client-quarkus
          - maas-client-spring
          - maas-client
          - maas-declarative-client-commons
          - maas-declarative-client-quarkus
          - maas-declarative-client-spring
          - core-internal-boms
          - core-external-boms
          - core-maven-plugins
      gavs:
        type: string
        description: "Comma separated list of GAV(s)"
        default: ""
      versionIncrementType:
        description: "Version part to increment"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      skipTest:
        description: "skip tests"
        type: boolean
        default: false
      dryRun:
        description: "dry run"
        type: boolean
        default: false
      logsToConsole:
        description: "log to console"
        type: boolean
        default: false

concurrency:
  group: "core-libs-monorepo-${{ inputs.branch }}"
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      MAVEN_USER: "x-access-token"
      MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.maven-gpg-passphrase }}
    outputs:
      result: ${{ steps.run-maven-bulk-release-cli.outputs.result }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: "main"
          token: '${{ secrets.GITHUB_TOKEN }}'

      - name: "Download GAVs from another release workflow(s)"
        id: download-gavs
        if: ${{ inputs.runIdsWithGAVs != '' || inputs.gavs != '' }}
        shell: bash
        env:
          RUN_IDS: ${{ inputs.runIdsWithGAVs }}
          INPUT_GAVS: ${{ inputs.gavs }}
        # language="shell script"
        run: |-
          GAVS="${INPUT_GAVS}"
          IFS=','
          for runId in ${RUN_IDS}; do
            url="https://api.github.com/repos/Netcracker/qubership-core-infra/actions/runs/${runId}/artifacts"
            gavsFile="gavs.txt"
            zipUrl=$(curl -s -L -H "Authorization: Bearer ${MAVEN_TOKEN}" "${url}" | jq -r --arg name "${gavsFile}" '.artifacts[] | select(.name == $name) | .archive_download_url')
            if [ -s "${zipUrl}" ]; then
              echo "artifacts from ${url} do not contain ${gavsFile} artifact"
              exit 1
            fi
            dir="/tmp/gavs_artifacts/${runId}"

            mkdir -p "${dir}"

            zipFile="${dir}/gavs.zip"
            echo "Downloading ${gavsFile} from ${zipUrl}"
            curl -o "${zipFile}" -L -H "Authorization: Bearer ${MAVEN_TOKEN}" "${zipUrl}" || { echo "Failed to download ${gavsFile}"; exit 1; }

            echo "Extracting ${zipFile} to ${dir}"
            unzip -o "${zipFile}" -d "${dir}" || { echo "Failed to extract ${zipFile}"; exit 1; }

            extractedGAVsFile="${dir}/${gavsFile}"
            if [ -e "${extractedGAVsFile}" ]; then
              gavs=$(cat "${extractedGAVsFile}" | tr '\n' ',')
              if [ -n "${GAVS}" ]; then
                 GAVS="${GAVS},${gavs}"
              else
                 GAVS="${gavs}"
              fi
            else
              echo "File ${extractedGAVsFile} not found"
              exit 1
            fi
          done
          echo "gavs=${GAVS}" >> "${GITHUB_OUTPUT}"

      - name: "Cache Maven dependencies"
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-maven-

      - name: "Set up java"
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: |
            17
            21
          architecture: 'x64'
          distribution: 'temurin'
          server-id: github
          server-username: MAVEN_USER
          server-password: MAVEN_TOKEN
          gpg-private-key: ${{ inputs.maven-gpg-private-key }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: "Run maven-bulk-release-cli"
        id: run-maven-bulk-release-cli
        shell: bash
        env:
          GAVS: ${{ steps.download-gavs.outputs.gavs }}
          BRANCH: ${{ inputs.branch }}
          MODULE_TO_RELEASE: ${{ inputs.moduleToRelease }}
          VERSION_INCREMENT_TYPE: ${{ inputs.versionIncrementType }}
          SKIP_TEST: ${{ inputs.skipTest }}
          DRY_RUN: ${{ inputs.dryRun }}
          LOG_TO_CONSOLE: ${{ inputs.logsToConsole }}
        # language="shell script"
        run: |
          cliVersion="1.8.2-SNAPSHOT"
          cliVersionSpecific="1.8.2-20260717.073910-24"
          url="https://maven.pkg.github.com/netcracker/qubership-core-bulk-release/org/qubership/cloud/maven-bulk-release-cli/${cliVersion}/maven-bulk-release-cli-${cliVersionSpecific}-jar-with-dependencies.jar"
          curl -L -o "maven-bulk-release-cli.jar" -H "Authorization: Bearer ${MAVEN_TOKEN}" "${url}"
          cli_jar="maven-bulk-release-cli.jar"

          options=""
          if [ "${SKIP_TEST}" = "true" ]; then
            options="${options} --skipTests"
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            options="${options} --dryRun"
          fi
          if [ "${LOG_TO_CONSOLE}" = "true" ]; then
            options="${options} --logsToConsole"
          fi

          args="--baseDir=/tmp"
          args="${args} --gitURL=https://github.com"
          args="${args} --gitUsername=actions"
          args="${args} --gitEmail=actions@github.com"
          args="${args} --gitPassword=${MAVEN_TOKEN}"
          args="${args} --mavenDeployArtifacts=false"
          args="${args} --runParallelism=1"
          args="${args} --gavs=${GAVS}"
          args="${args} --versionIncrementType=${VERSION_INCREMENT_TYPE}"
          args="${args} --javaVersionToJavaHomeEnv=17=${JAVA_HOME_17_X64},21=${JAVA_HOME_21_X64}"
          args="${args} --resultOutputFile=${GITHUB_OUTPUT}"
          args="${args} --summaryFile=${GITHUB_STEP_SUMMARY}"
          args="${args} --gavsResultFile=/tmp/gavs.txt"
          args="${args} --dependencyGraphFile=/tmp/graph.dot"

          repositories="https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-blue-green-state-monitor-quarkus]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-blue-green-state-monitor]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-context-propagation-quarkus]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-context-propagation]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-error-handling]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-junit-k8s-extension]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-microservice-dependencies]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-microservice-framework-extensions]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-microservice-framework]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-mongo-evolution]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-process-orchestrator]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-quarkus-extensions]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-rest-libraries]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-restclient]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-springboot-starter]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-utils]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=dbaas-client]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=maas-client-quarkus]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=maas-client-spring]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=maas-client]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=maas-declarative-client-commons]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=maas-declarative-client-quarkus]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=maas-declarative-client-spring]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-internal-boms]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-external-boms]
          https://github.com/TaurMorchant/qubership-core-java-libs-test[branch=${BRANCH},pomFolder=core-maven-plugins]"

          # set module to release from — partial release is only allowed from non-main branches
          if [ "${MODULE_TO_RELEASE}" != "all" ] && [ "${BRANCH}" != "main" ]; then
            repositoryToReleaseFrom=$(echo "${repositories}" | grep -E ".*pomFolder=${MODULE_TO_RELEASE}\]")
            args="${args} --repositoryToReleaseFrom=${repositoryToReleaseFrom}"
          fi

          # opt-in: rewrite inter-module deps back to SNAPSHOT after a full release from main
          args="${args} --switchInterModuleDepsToSnapshot"

          tmpfile=$(mktemp)
          cat >"$tmpfile" <<EOF
          $repositories
          EOF

          args="${args} --repositoriesFile=${tmpfile}"

          args="${args} ${options}"
          cmd="java -jar ${cli_jar} ${args}"
          echo "running cmd: ${cmd}"
          eval "${cmd}"

      - name: "Upload gavs artifact"
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: gavs.txt
          path: /tmp/gavs.txt

      - name: "Upload graph artifact"
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: graph.dot
          path: /tmp/graph.dot

      - name: "Upload logs artifact"
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: logs
          path: /tmp/logs/
