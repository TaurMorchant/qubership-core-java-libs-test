# Maven Incremental Verify Workflow
#
# Runs `verify` on the modules a PR changes plus their downstream dependents, via
# gitflow-incremental-builder (GIB). Unchanged upstream modules come from the package
# registry instead of being rebuilt. GIB diffs HEAD against the PR's base branch by merge
# base; with no module changed it runs `validate` on the root only.
#
# Requirements:
#   - Inter-module dependencies must reference the SNAPSHOT versions the modules currently
#     have in the repo. GIB derives downstream dependents from Maven's reactor graph, which
#     links two modules only when groupId, artifactId and version all match. A dependency
#     pinned to a release version forms no edge, so dependents of a changed module are never
#     selected and silently go unverified.
#   - A mainline job must publish every module's SNAPSHOT to the registry regularly, and
#     cleanup must retain those versions. Otherwise unchanged modules resolve to stale
#     artifacts, or fail to resolve at all.
#   - .mvn/extensions.xml registers GIB; root pom sets gib.disable=true (local builds stay
#     full), gib.buildUpstream=never, gib.buildDownstream=always.
#   - fetch-depth: 0 and the base branch ref — provided by generic-maven-build.yaml.
#   - permissions: at least packages: write and pull-requests: write, as the reusable workflow
#     declares; less fails before any job starts.
#
# See generic-maven-build.yaml for build features and secrets/vars.

name: Maven incremental verify

run-name: >
  Verify —
  PR (${{ github.head_ref }}) —
  [${{ github.event.pull_request.title }}]

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  maven-verify:
    name: Maven incremental verify
    uses: Netcracker/qubership-core-infra/.github/workflows/generic-maven-build.yaml@8668020927f2a84d8d096a359c719c3c3a403520 # v2.5.0
    with:
      maven-command: 'verify -T 1C -Dorg.slf4j.simpleLogger.showThreadId=true -Dgib.disable=false -Dgib.referenceBranch=refs/remotes/origin/${{ github.base_ref }} -Dgib.fetchReferenceBranch=true'
      maven-username: 'TaurMorchant'
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
    secrets:
      MAVEN_TOKEN: ${{ secrets.GH_RWD_PACKAGE_TOKEN }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
