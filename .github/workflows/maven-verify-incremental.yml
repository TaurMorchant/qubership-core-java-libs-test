# Maven Verify Workflow — incremental (experimental)
#
# Validates pull requests by running Maven verify on ONLY the modules changed
# relative to the target branch (main) and their downstream dependents, using
# gitflow-incremental-builder. Non-changed upstream internal modules are resolved
# from the package registry instead of being built.
#
# Runs alongside maven-verify.yml (which verifies the full reactor) for comparison.
#
# Triggers:
#   - Pull request opened, synchronized, or reopened
#
# Note: for pull_request events GitHub uses the workflow definition from the base
# branch (main), so this file must be on main before it runs on future PRs.
#
# See generic-maven-build.yaml for full documentation on build features and required secrets/vars.

name: Maven verify incremental (experimental)

run-name: >
  Verify incremental —
  PR (${{ github.head_ref }}) —
  [${{ github.event.pull_request.title }}]

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  maven-verify-incremental:
    name: Maven verify incremental
    uses: Netcracker/qubership-core-infra/.github/workflows/generic-maven-build.yaml@8668020927f2a84d8d096a359c719c3c3a403520 # v2.5.0
    with:
      maven-command: 'verify -T 1C -Dorg.slf4j.simpleLogger.showThreadId=true -Dgib.disable=false -Dgib.referenceBranch=refs/remotes/origin/main -Dgib.fetchReferenceBranch=true'
      maven-username: 'TaurMorchant'
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
    secrets:
      MAVEN_TOKEN: ${{ secrets.GH_RWD_PACKAGE_TOKEN }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
