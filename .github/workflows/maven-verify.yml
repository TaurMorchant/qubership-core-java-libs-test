# Maven Verify Workflow
#
# Validates pull requests by running Maven verify (compile, test, check).
# Uses generic-maven-build.yaml for the actual build process.
#
# Triggers:
#   - Pull request opened, synchronized, or reopened
#
# See generic-maven-build.yaml for full documentation on build features and required secrets/vars.

name: Maven verify

run-name: >
  Verify —
  PR (${{ github.head_ref }}) —
  [${{ github.event.pull_request.title }}]

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  maven-verify:
    name: Maven verify
    uses: Netcracker/qubership-core-infra/.github/workflows/generic-maven-build.yaml@v2.4.1
    with:
      maven-command: 'verify -T 1C -Dorg.slf4j.simpleLogger.showThreadId=true'
      maven-username: 'NetcrackerCLPLCI'
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
    secrets:
      MAVEN_TOKEN: ${{ secrets.GH_RWD_PACKAGE_TOKEN }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

